<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Agêntico - Sistema Agêntico Local</title>
    <meta name="description" content="Sistema agêntico local open source com autenticação e múltiplos LLMs">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🚀</text></svg>">
    
    <style>
        /* Loading screen */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #080c0f;
            color: #c8d8e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'IBM Plex Sans', sans-serif;
            z-index: 9999;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1e2d3d;
            border-top: 3px solid #f5a623;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 18px;
            color: #5a7a96;
            margin-bottom: 10px;
        }
        
        .loading-subtitle {
            font-size: 14px;
            color: #5a7a96;
            font-family: 'IBM Plex Mono', monospace;
        }
        
        /* Hide loading when app loads */
        .loaded #loading {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">🚀 Iniciando Agêntico</div>
        <div class="loading-subtitle">Sistema Agêntico Local com Autenticação</div>
    </div>
    
    <!-- React App Root -->
    <div id="root"></div>
    
    <!-- Main App Script -->
    <script type="module" src="/src/main_auth.jsx"></script>
    
    <script>
        // Hide loading screen when app is ready
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.body.classList.add('loaded');
            }, 500);
        });
        
        // Handle errors gracefully
        window.addEventListener('error', function(e) {
            console.error('Application error:', e.error);
            const loading = document.getElementById('loading');
            if (loading) {
                loading.innerHTML = `
                    <div style="color: #f87171; text-align: center; max-width: 400px; padding: 20px;">
                        <h3>❌ Erro ao Iniciar</h3>
                        <p>Ocorreu um erro ao carregar a aplicação.</p>
                        <p style="font-size: 12px; margin-top: 10px;">Verifique o console para mais detalhes.</p>
                        <button onclick="window.location.reload()" style="
                            margin-top: 20px;
                            padding: 10px 20px;
                            background: #f5a623;
                            color: #080c0f;
                            border: none;
                            border-radius: 6px;
                            cursor: pointer;
                            font-family: 'IBM Plex Mono', monospace;
                        ">Recarregar</button>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
