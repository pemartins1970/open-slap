<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Slap!</title>
    <meta name="description" content="Sistema agêntico local open source com autenticação e múltiplos LLMs">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🚀</text></svg>">
    
    <style>
        /* Loading screen */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #080c0f;
            color: #c8d8e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'IBM Plex Sans', sans-serif;
            z-index: 9999;
        }

        .loading-logo {
            width: 350px;
            height: 250px;
            object-fit: contain;
            margin-bottom: 16px;
        }

        .loading-text {
            font-size: 18px;
            color: #5a7a96;
            margin-bottom: 10px;
        }
        
        /* Hide loading when app loads */
        .loaded #loading {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <div class="loading-text">Loading Open Slap!...</div>
    </div>
    
    <!-- React App Root -->
    <div id="root"></div>
    
    <!-- Main App Script -->
    <script type="module" src="/src/main_auth.jsx"></script>
    
    <script>
        window.addEventListener('error', function(e) {
            console.error('Application error:', e.error);
            const loading = document.getElementById('loading');
            if (loading) {
                loading.innerHTML = `
                    <div style="color: #f87171; text-align: center; max-width: 400px; padding: 20px;">
                        <h3>❌ Failed to start</h3>
                        <p>An error occurred while loading the application.</p>
                        <p style="font-size: 12px; margin-top: 10px;">Check the console for details.</p>
                        <button onclick="window.location.reload()" style="
                            margin-top: 20px;
                            padding: 10px 20px;
                            background: #f5a623;
                            color: #080c0f;
                            border: none;
                            border-radius: 6px;
                            cursor: pointer;
                            font-family: 'IBM Plex Mono', monospace;
                        ">Reload</button>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
