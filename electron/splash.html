<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slap! — Iniciando...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e; color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; gap: 20px;
    }
    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }
    h1 { font-size: 2rem; color: #7c6af7; letter-spacing: 2px; margin-top: 8px; }
    .subtitle { font-size: 0.85rem; color: #888; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { font-size: 0.9rem; color: #aaa; min-height: 1.2em; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <img class="logo" src="../frontend/dist/open_slap.png" alt="Slap! Logo">
  <h1>Slap!</h1>
  <p class="subtitle">Assistente Inteligente Local</p>
  <div class="spinner"></div>
  <p id="status">Iniciando sistema...</p>
  <script>
    if (window.electronAPI) {
      window.electronAPI.onStartupStatus((msg) => {
        document.getElementById('status').textContent = msg;
      });
    }
  </script>
</body>
</html>
